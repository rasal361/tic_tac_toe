<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #1a1a1f;
    --surface2: #242429;
    --border: #2e2e36;
    --x-color: #7c6af7;
    --x-light: #a89af9;
    --o-color: #f7706a;
    --o-light: #f99e9a;
    --text: #f0eeff;
    --muted: #7a798a;
    --win-bg: rgba(124,106,247,0.12);
    --win-bg-o: rgba(247,112,106,0.12);
    --radius: 14px;
    --cell-radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .container {
    width: 100%;
    max-width: 420px;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--x-color), var(--o-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
  }

  /* Mode & Difficulty toggles */
  .toggle-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    background: var(--surface);
    border-radius: 50px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .toggle-btn {
    flex: 1;
    padding: 8px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    border-radius: 40px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .difficulty-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .diff-btn {
    flex: 1;
    padding: 8px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .diff-btn.active-easy  { background: rgba(99,201,100,0.12); color: #63c964; border-color: #63c964; }
  .diff-btn.active-medium{ background: rgba(247,180,106,0.12); color: #f7b46a; border-color: #f7b46a; }
  .diff-btn.active-hard  { background: rgba(247,112,106,0.12); color: var(--o-color); border-color: var(--o-color); }

  /* Scoreboard */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    margin-bottom: 1.25rem;
    align-items: center;
  }

  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
    transition: border-color 0.3s;
  }

  .score-card.active-x { border-color: var(--x-color); }
  .score-card.active-o { border-color: var(--o-color); }

  .score-card .player-sym {
    font-size: 20px;
    font-weight: 800;
  }
  .score-card.x-card .player-sym { color: var(--x-color); }
  .score-card.o-card .player-sym { color: var(--o-color); }

  .score-card .player-name {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 2px;
  }

  .score-card .score-num {
    font-size: 28px;
    font-weight: 800;
    margin-top: 4px;
  }
  .score-card.x-card .score-num { color: var(--x-light); }
  .score-card.o-card .score-num { color: var(--o-light); }

  .draw-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
    text-align: center;
  }
  .draw-card .draw-label { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
  .draw-card .draw-num { font-size: 20px; font-weight: 700; color: var(--muted); }

  /* Status */
  .status {
    text-align: center;
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    margin-bottom: 1.25rem;
    min-height: 20px;
    transition: color 0.3s;
  }
  .status.x-turn { color: var(--x-light); }
  .status.o-turn { color: var(--o-light); }
  .status.win    { color: var(--text); font-weight: 700; }
  .status.draw   { color: var(--muted); }

  /* Board */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .cell {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--cell-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .cell:hover:not(.taken) {
    background: var(--surface2);
    border-color: #444;
    transform: scale(1.03);
  }

  .cell.taken { cursor: default; }

  .cell .mark {
    display: inline-block;
    transform: scale(0);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  .cell.placed .mark { transform: scale(1); }

  .cell.x-cell .mark { color: var(--x-color); }
  .cell.o-cell .mark { color: var(--o-color); }

  .cell.win-cell {
    animation: winPulse 0.5s ease forwards;
  }
  .cell.win-cell.x-cell { background: var(--win-bg); border-color: var(--x-color); }
  .cell.win-cell.o-cell { background: var(--win-bg-o); border-color: var(--o-color); }

  @keyframes winPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .cell.shake {
    animation: shake 0.3s ease;
  }
  @keyframes shake {
    0%,100%{ transform: translateX(0); }
    25%    { transform: translateX(-4px); }
    75%    { transform: translateX(4px); }
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: background 0.15s, transform 0.1s;
  }

  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--x-color);
    border-color: var(--x-color);
    color: #fff;
  }
  .btn.primary:hover { background: var(--x-light); border-color: var(--x-light); }

  /* AI thinking indicator */
  .thinking {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--o-color);
    margin-bottom: 1rem;
    min-height: 20px;
  }
  .thinking.show { display: flex; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--o-color); animation: bounce 0.8s infinite; }
  .dot:nth-child(2){ animation-delay: 0.15s; }
  .dot:nth-child(3){ animation-delay: 0.30s; }
  @keyframes bounce { 0%,80%,100%{ transform:translateY(0); } 40%{ transform:translateY(-6px); } }

  .diff-label {
    display: none;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 12px;
    text-align: center;
  }
  .diff-label.show { display: block; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Tic-Tac-Toe</h1>
    <p>first to 3 in a row wins</p>
  </div>

  <!-- Mode toggle -->
  <div class="toggle-row">
    <button class="toggle-btn active" id="btn-2p" onclick="setMode('2p')">2 Players</button>
    <button class="toggle-btn" id="btn-ai" onclick="setMode('ai')">vs Computer</button>
  </div>

  <!-- Difficulty (AI only) -->
  <div id="diff-row" class="difficulty-row" style="display:none;">
    <button class="diff-btn active-easy" id="diff-easy" onclick="setDiff('easy')">Easy</button>
    <button class="diff-btn" id="diff-medium" onclick="setDiff('medium')">Medium</button>
    <button class="diff-btn" id="diff-hard" onclick="setDiff('hard')">Hard</button>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-card x-card active-x" id="card-x">
      <div class="player-sym">X</div>
      <div class="player-name" id="name-x">Player X</div>
      <div class="score-num" id="score-x">0</div>
    </div>
    <div class="draw-card">
      <div class="draw-label">draws</div>
      <div class="draw-num" id="score-d">0</div>
    </div>
    <div class="score-card o-card" id="card-o">
      <div class="player-sym">O</div>
      <div class="player-name" id="name-o">Player O</div>
      <div class="score-num" id="score-o">0</div>
    </div>
  </div>

  <!-- AI thinking -->
  <div class="thinking" id="thinking">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span>computer thinking...</span>
  </div>

  <!-- Status -->
  <div class="status x-turn" id="status">Player X's turn</div>

  <!-- Board -->
  <div class="board" id="board">
    <div class="cell" id="c0" onclick="handleClick(0)"><span class="mark"></span></div>
    <div class="cell" id="c1" onclick="handleClick(1)"><span class="mark"></span></div>
    <div class="cell" id="c2" onclick="handleClick(2)"><span class="mark"></span></div>
    <div class="cell" id="c3" onclick="handleClick(3)"><span class="mark"></span></div>
    <div class="cell" id="c4" onclick="handleClick(4)"><span class="mark"></span></div>
    <div class="cell" id="c5" onclick="handleClick(5)"><span class="mark"></span></div>
    <div class="cell" id="c6" onclick="handleClick(6)"><span class="mark"></span></div>
    <div class="cell" id="c7" onclick="handleClick(7)"><span class="mark"></span></div>
    <div class="cell" id="c8" onclick="handleClick(8)"><span class="mark"></span></div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn primary" onclick="resetBoard()">New game</button>
    <button class="btn" onclick="resetAll()">Reset scores</button>
  </div>

</div>

<script>
  let board = Array(9).fill('');
  let current = 'X';
  let gameOver = false;
  let mode = '2p';
  let difficulty = 'easy';
  let scores = { X: 0, O: 0, D: 0 };
  let aiLocked = false;

  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  function setMode(m) {
    mode = m;
    document.getElementById('btn-2p').classList.toggle('active', m === '2p');
    document.getElementById('btn-ai').classList.toggle('active', m === 'ai');
    document.getElementById('diff-row').style.display = m === 'ai' ? 'flex' : 'none';
    document.getElementById('name-o').textContent = m === 'ai' ? 'Computer' : 'Player O';
    resetBoard();
  }

  function setDiff(d) {
    difficulty = d;
    ['easy','medium','hard'].forEach(x => {
      const b = document.getElementById('diff-' + x);
      b.className = 'diff-btn' + (x === d ? ' active-' + x : '');
    });
    resetBoard();
  }

  function handleClick(i) {
    if (gameOver || board[i] || aiLocked) return;
    makeMove(i, 'X');
    if (!gameOver && mode === 'ai') {
      aiLocked = true;
      document.getElementById('thinking').classList.add('show');
      const delay = difficulty === 'easy' ? 400 : difficulty === 'medium' ? 600 : 800;
      setTimeout(() => {
        document.getElementById('thinking').classList.remove('show');
        if (!gameOver) makeMove(getAIMove(), 'O');
        aiLocked = false;
      }, delay);
    }
  }

  function makeMove(i, player) {
    board[i] = player;
    const cell = document.getElementById('c' + i);
    cell.classList.add(player === 'X' ? 'x-cell' : 'o-cell', 'taken');
    cell.querySelector('.mark').textContent = player;
    requestAnimationFrame(() => cell.classList.add('placed'));

    const w = checkWin(player);
    if (w) {
      w.forEach(idx => {
        setTimeout(() => document.getElementById('c' + idx).classList.add('win-cell'), idx * 60);
      });
      const winner = mode === 'ai' && player === 'O' ? 'Computer wins!' : `Player ${player} wins!`;
      setStatus(winner, 'win');
      scores[player]++;
      document.getElementById('score-' + player.toLowerCase()).textContent = scores[player];
      gameOver = true;
      setActiveCard(null);
    } else if (board.every(c => c)) {
      setStatus("It's a draw!", 'draw');
      scores.D++;
      document.getElementById('score-d').textContent = scores.D;
      gameOver = true;
      setActiveCard(null);
    } else {
      current = player === 'X' ? 'O' : 'X';
      const nextName = mode === 'ai' && current === 'O' ? 'Computer' : 'Player ' + current;
      setStatus(nextName + "'s turn", current === 'X' ? 'x-turn' : 'o-turn');
      setActiveCard(current);
    }
  }

  function setStatus(msg, cls) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = 'status ' + cls;
  }

  function setActiveCard(p) {
    document.getElementById('card-x').classList.toggle('active-x', p === 'X');
    document.getElementById('card-o').classList.toggle('active-o', p === 'O');
  }

  function checkWin(p) {
    for (const c of WINS) if (c.every(i => board[i] === p)) return c;
    return null;
  }

  /* AI logic */
  function getAIMove() {
    if (difficulty === 'easy') return randomMove();
    if (difficulty === 'medium') return Math.random() < 0.5 ? smartMove() : randomMove();
    return minimaxMove();
  }

  function randomMove() {
    const empty = board.map((v,i) => v ? null : i).filter(i => i !== null);
    return empty[Math.floor(Math.random() * empty.length)];
  }

  function smartMove() {
    for (const c of WINS) {
      const os = c.filter(i => board[i] === 'O'), empty = c.filter(i => !board[i]);
      if (os.length === 2 && empty.length === 1) return empty[0];
    }
    for (const c of WINS) {
      const xs = c.filter(i => board[i] === 'X'), empty = c.filter(i => !board[i]);
      if (xs.length === 2 && empty.length === 1) return empty[0];
    }
    if (!board[4]) return 4;
    const corners = [0,2,6,8].filter(i => !board[i]);
    if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
    return randomMove();
  }

  function minimaxMove() {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const score = minimax(board, 0, false);
        board[i] = '';
        if (score > best) { best = score; move = i; }
      }
    }
    return move;
  }

  function minimax(b, depth, isMax) {
    const wx = WINS.some(c => c.every(i => b[i] === 'X'));
    const wo = WINS.some(c => c.every(i => b[i] === 'O'));
    if (wo) return 10 - depth;
    if (wx) return depth - 10;
    if (b.every(c => c)) return 0;
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) { b[i]='O'; best=Math.max(best,minimax(b,depth+1,false)); b[i]=''; }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) { b[i]='X'; best=Math.min(best,minimax(b,depth+1,true)); b[i]=''; }
      }
      return best;
    }
  }

  function resetBoard() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    aiLocked = false;
    document.getElementById('thinking').classList.remove('show');
    for (let i = 0; i < 9; i++) {
      const cell = document.getElementById('c' + i);
      cell.className = 'cell';
      cell.querySelector('.mark').textContent = '';
    }
    setStatus("Player X's turn", 'x-turn');
    setActiveCard('X');
  }

  function resetAll() {
    scores = { X: 0, O: 0, D: 0 };
    document.getElementById('score-x').textContent = '0';
    document.getElementById('score-o').textContent = '0';
    document.getElementById('score-d').textContent = '0';
    resetBoard();
  }
</script>
</body>
</html>
